<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Login</title>
</head>

<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class = col-md-5>
                <div class="card shadow">
                    <div class="card-body p-4">

                    <h1 class="text-center mb-4">Login</h1>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email">Email</label>
                            <br>
                            <input type="email" name="email" id="email" required placeholder="example@gmail.com" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="password">Password</label>
                            <br>
                            <input type="password" name="password" id="password" required placeholder="Enter your password" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>

                    <p id="message"></p>

                    <p>
                        Don't have an account?
                        <a href="register.html">Register</a>
                    </p>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/csrf.js"></script>

    <script>
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            const csrf = await fetchCsrfToken();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    [csrf.headerName]: csrf.token
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const result = await response.text();

            if (response.ok) {
                message.textContent = result;
                window.location.href = "/dashboard.html";
            } else {
                message.textContent = "Error: " + result;
            }
        });
    </script>

</body>
</html>
